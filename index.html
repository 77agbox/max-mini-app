<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Кружки</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<h1>Кружки</h1>

<input
type="text"
id="search"
placeholder="🔎 Найти кружок..."
oninput="filterClubs()"
/>

<div class="filters">

<select id="ageFilter" onchange="filterClubs()">
<option value="">Возраст</option>
</select>

<select id="addressFilter" onchange="filterClubs()">
<option value="">Адрес</option>
</select>

<select id="directionFilter" onchange="filterClubs()">
<option value="">Направление</option>
</select>

</div>

<div id="clubs"></div>

<script src="app.js"></script>

</body>

</html>
